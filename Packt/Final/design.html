<!DOCTYPE html>
<html lang="en-US">

    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">

        <title>Den's T-Shirt Store</title>

        <link rel="stylesheet" href="style.css">
    </head>

    <body>

        <header>
            <img class="small-image" src="images/shirt_header.jpg">
            <div>
                <h1>Den's T-Shirt Store</h1>
                <p>We Dress For Comfort and Style</p>
            </div>
            <img class="small-image" src="images/shirt_header.jpg">
        </header>

        <main id="tool">
            <nav>
                <a href="home.html">Home</a>
                <a href="design.html">Design</a>
                <a href="pricing.html">Pricing</a>
                <a href="sizing.html">Sizing</a>
                <a href="contact.html">Contact</a>
            </nav>
            
            <div id="tool-div">
                <h2>Design Your Own T Shirt</h2>
                
                <div id="tool-calc">
                    <h3>Select Your Size</h3>
                    <form id="size-form">
                        <input type="radio" id="small" value="small" name="size">
                        <label for="small">Small</label>
                        <input type="radio" id="medium" value="medium" name="size">
                        <label for="medium">Medium</label>
                        <input type="radio" id="large" value="large" name="size">
                        <label for="large">Large</label>
                        <input type="radio" id="extra" value="extra" name="size">
                        <label for="extra">X Large</label>
                    </form>

                    <h3>Select Your Style</h3>
                    <div>
                        <label for="style">Choose A Shirt Style</label>
                        <select id="style" name="style">
                            <option value="short">Short Sleeve</option>
                            <option value="crew">Crew</option>
                            <option value="polo">Polo</option>
                            <option value="dress">Dress</option>
                            <option value="jersey">Jersey</option>
                        </select>
                    </div>

                    <h3>Select Your Color</h3>
                    <div>
                        <input type="color" id="color">
                    </div>
                </div>
                <div id="tool-values">
                    <h3>Here Is Your Shirt</h3>
                    <img id="shirt-image" class="small-image" src="images/shirt_icon.png"
                    
                </div>
            </div>
        </main>

        <footer>
            <p>Call Today: 1-800-555-1212</p>
        </footer>

        <script src="design.js"></script>

    </body>

</html>
