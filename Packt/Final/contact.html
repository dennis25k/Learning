<!DOCTYPE html>
<html lang="en-US">

    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">

        <title>Den's T-Shirt Store</title>

        <link rel="stylesheet" href="style.css">
    </head>

    <body>

        <header>
            <img class="small-image" src="images/shirt_header.jpg">
            <div>
                <h1>Den's T-Shirt Store</h1>
                <p>We Dress For Comfort and Style</p>
            </div>
            <img class="small-image" src="images/shirt_header.jpg">
        </header>

        <main id="contact">
            <nav>
                <a href="home.html">Home</a>
                <a href="design.html">Design</a>
                <a href="pricing.html">Pricing</a>
                <a href="sizing.html">Sizing</a>
                <a href="contact.html">Contact</a>
            </nav>
            
            <div id="contact-div">
                <h2>Enter Your Information</h2>
                <form id="contact-form" method="post">
                    <div>
                        <label for="name">Full Name</label>
                        <input type="text" id="name" name="userName" placeholder="Enter Your Full Name">
                    </div>

                    <div>
                        <label for="email">Email</label>
                        <input type="email" id="email" name="userEmail" placeholder="Enter Your Email">
                    </div>

                    <div>
                        <label for="phone">Phone Number</label>
                        <input type="tel" id="phone" name="userPhone" placeholder="Enter Your Phone Number">
                    </div>

                    <div>
                        <label for="time">Best Time To Contact</label>
                        <input type="time" id="time" name="userTime" placeholder="Best Time To Contact">
                    </div>

                    <div>
                        <label for="method">Preferred Contact Method</label>
                        <select id="method" name="preferredMethod">
                            <option value="email">Emial</option>
                            <option value="phone">Phone</option>
                        </select>
                    </div>
                    
                    <div id="submit">
                        <button type="submit">Submit</button>
                        <button type="reset">Reset</button>
                    </div>

                </form>
                <p id="message"></p>
            </div>
        </main>

        <footer>
            <p>Call Today: 1-800-555-1212</p>
        </footer>

        <script src="contact.js"></script>

    </body>

</html>
