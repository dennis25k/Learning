<!DOCTYPE html>
<html lang="en-US">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">

        <title>Denoogle</title>

        <link rel="stylesheet" href="style.css">

    </head>

    <body>

        <header>
            <img class="small-image" src="search.png" alt="A Search Glass Icon">
            <h1>Denoogle</h1>
            <img class="small-image" src="search.png" alt="A Search Glass Icon">
        </header>

        <main>
            <section id="search">
                <form action="https://www.google.com/search">
                    <input type="text" id="search" name="q">
                    <div class="button">
                        <button class="btn" type="Submit">Search</button>
                    </div>
                </form>
            </section>

            <h2 id="headline">Today's News</h2>
            <section id="news">
                <div class="news-item">
                    <h3>Baseball Attendance At All Time Highs</h3>
                    <a href="https://www.google.com"><img class="image-icon" src="baseball.jpg"></a>
                </div>
                <div class="news-item">
                    <h3>Doctors Find Cure!</h3>
                    <a href="https://www.google.com"><img class="image-icon" src="doc.jpg"></a>
                </div>
                <div class="news-item">
                    <h3>Fresh Food in Town</h3>
                    <a href="https://www.google.com"><img class="image-icon" src="food.jpg"></a>
                </div>
                <div class="news-item">
                    <h3>Popcorn or Candy? The Debate Is On!</h3>
                    <a href="https://www.google.com"><img class="image-icon" src="popcorn.jpg"></a>
                </div>
                <div class="news-item">
                    <h3>UN Leader Meet at Summit</h3>
                    <a href="https://www.google.com"><img class="image-icon" src="meeting.jpg"></a>
                </div>
                <div class="news-item">
                    <h3>How Productive Are You Really?</h3>
                    <a href="https://www.google.com"><img class="image-icon" src="productive.jpg"></a>
                </div>
            </section>

        </main>

        <footer>
            <a href="https://www.google.com" target="_blank">Google</a>
            <a href="https:www.bing.com" target="_blank">Bing</a>
            <p>Powered by Google and refined by You!</p>
            <a href="https://www.yahoo.com" target="_blank">Yahoo</a>
            <a href="https://www.duckduckgo.com" target="_blank">Duck Duck Go</a>
        </footer>

    </body>
</html>
