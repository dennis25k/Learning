<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The EV Collection</title>
</head>
<body>
    <div id="header" style="background-color: antiquewhite;">
        <h1>Welcome to the EV Collection</h1>
        <hr>
    </div>

    <div id="main" style="background-color: lightcoral;">
        <h2>Please Log In</h2>
        <form action="pages/main.html">
            <label for="user">User Name</label>
            <input type="text" id="user" name="userName" placeholder="Enter User Name" required>

            <label for="password">Password</label>
            <input type="password" id="password" name="userPassword" placeholder="Enter Password" required>

            <button type="submit">Submit</button>
            <button type="reset">Clear</button>
        </form>
    </div>
</body>
</html>
